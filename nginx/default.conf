server {
    listen 443 ssl;
    server_name 91.92.133.224 localhost;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    client_max_body_size 40M;

    # Serve static files
    location / {
        root /usr/share/nginx/html/static;
        index index.html;
        try_files $uri $uri/ /index.html;
        access_log /var/log/nginx/static_access.log;
        error_log /var/log/nginx/static_error.log debug;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log /var/log/nginx/static_access.log;
        error_log /var/log/nginx/static_error.log debug;
    }

    # Proxy transcription requests
    location /transcribe {
        proxy_pass http://app:662/transcribe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log debug;
    }

    # Proxy download requests
    location /download {
        proxy_pass http://app:662/download;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log debug;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 "Not Found";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 "Internal Server Error";
    }

    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log;
}

server {
    listen 80;
    server_name 91.92.133.224 localhost;
    return 301 https://$host:6002$request_uri;
}